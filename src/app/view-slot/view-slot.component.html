<app-doctorHeader></app-doctorHeader>
<!-- {{getQuery|json}} -->
<form class="form">
  <table>
    <thead>
      <th>S.No</th>
      <th>Patient name</th>
      <th>Contact no</th>
      <th>Appointment date</th>
      <th>Appointment time</th>
      <th>Health issue</th>
      <th>Select</th>
    </thead>
    
    <tbody>
      <tr *ngFor="let appointment of getAppointment">
        <td>{{appointment.id}}</td>
        <td>{{appointment.patientName}}</td>
        <td>{{appointment.mobileno}}</td>
        <td>{{appointment.date| date: 'dd/MM/yyyy'}}</td>
        <td>{{appointment.time}}</td>
        <td>{{appointment.say}}</td>
        <td>
          <button class="back" [disabled]="isDisableAccept" [hidden]="isHiddenCancel" (click)="accept()">Accept</button>
          <button class="back" [hidden]="isHiddenAccept" [disabled]="isDisableCancel" (click)="cancel()">Cancel</button>
        </td>
      </tr>
    </tbody>
  </table>
</form>
<app-footer></app-footer>
